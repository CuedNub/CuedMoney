<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CuedMoney - Ledger</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#121212">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="CuedMoney">
    <link rel="apple-touch-icon" href="icons/icon-192.png">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <!-- BANNER UPDATE -->
    <div id="update-banner" class="update-banner">
        <div class="update-text">
            🔄 Update tersedia!
            <small id="update-version-info">Versi baru siap dipasang</small>
        </div>
        <button class="btn-update" onclick="AppUpdate.doUpdate()">UPDATE</button>
        <button class="btn-dismiss" onclick="AppUpdate.dismissUpdate()">✕</button>
    </div>

    <!-- HEADER -->
    <header class="app-header">
        <button class="btn-sidebar-toggle" id="btn-sidebar-toggle" onclick="Core.openSidebar()">☰</button>
        <div class="logo" id="app-logo" onclick="if(window.License)License.handleLogoClick()">
            CuedMoney
            <span id="app-version" style="font-size:0.5rem;color:#555;font-weight:400;"></span>
        </div>
    </header>

    <!-- BANNER PENGINGAT BACKUP -->
    <div id="backup-banner" class="backup-banner">
        <div class="backup-content">
            <div class="backup-icon">⚠️</div>
            <div class="backup-text">
                <div class="backup-title">Data belum disimpan!</div>
                <div id="backup-info-text" class="backup-desc">Simpan data agar tidak hilang.</div>
            </div>
        </div>
        <button class="backup-btn" onclick="SyncModule.quickBackup()">💾 SIMPAN</button>
    </div>

    <!-- LICENSE LOCKSCREEN -->
    <div id="license-lockscreen" class="license-lockscreen">
        <div class="lock-icon">🔒</div>
        <div id="lock-title" class="lock-title">Masa Aktif Berakhir</div>
        <div id="lock-desc" class="lock-desc">Hubungi admin untuk kode lisensi.</div>
        <div class="lock-buttons">
            <button class="btn-lock-primary" onclick="License.lockscreenInput()">🔑 Input Lisensi</button>
            <button class="btn-lock-secondary" onclick="License.lockscreenExport()">📤 Export Data</button>
        </div>
    </div>

    <!-- SIDEBAR OVERLAY (background gelap saat sidebar terbuka) -->
    <div id="sidebar-overlay" class="sidebar-overlay" onclick="Core.closeSidebar()"></div>

    <!-- SIDEBAR PANEL -->
    <div id="sidebar-panel" class="sidebar-panel">

        <!-- Tombol tutup sidebar -->
        <div class="sidebar-header">
            <span class="sidebar-title">Menu</span>
            <button class="sidebar-close" onclick="Core.closeSidebar()">✕</button>
        </div>

        <!-- Section: Rincian Rekening Digital -->
        <div class="sidebar-content">
            <div id="sidebar-rekening-area">
                <!-- Diisi oleh DashLiquid.renderSidebar() -->
            </div>

            <!-- Divider -->
            <div class="sidebar-divider"></div>

            <!-- Section: Hutang & Piutang -->
            <div id="sidebar-debt-area">
                <!-- Diisi oleh DashDebt.renderSidebar() -->
            </div>

            <!-- Divider -->
            <div class="sidebar-divider"></div>

            <!-- Menu Navigasi -->
            <div class="sidebar-menu">
                <button class="sidebar-menu-item" onclick="Core.showTentang()">
                    <span class="sidebar-menu-icon">ℹ️</span>
                    <span class="sidebar-menu-label">Tentang</span>
                </button>
                <button class="sidebar-menu-item" onclick="Core.closeSidebar(); SyncModule.exportData()">
                    <span class="sidebar-menu-icon">📤</span>
                    <span class="sidebar-menu-label">Export Data</span>
                </button>
                <button class="sidebar-menu-item" onclick="Core.closeSidebar(); document.getElementById('import-file').click()">
                    <span class="sidebar-menu-icon">📥</span>
                    <span class="sidebar-menu-label">Import Data</span>
                </button>
            </div>

        </div>
    </div>

    <!-- Input file import (tersembunyi) -->
    <input type="file" id="import-file" style="display: none;" accept=".json" onchange="SyncModule.importData(event)">

    <!-- KONTEN UTAMA -->
    <main id="app-content">
        <section id="dash-liquid-area"></section>
        <section id="dash-debt-area"></section>
        <section id="filter-area"></section>
        <section id="transaction-list-area"></section>
    </main>

    <button class="fab" onclick="FormUniversal.open()">+</button>

    <div id="modal-overlay" class="modal-overlay" onclick="Core.closeModal()"></div>
    <div id="modal-container" class="modal-container">
        <button class="modal-close" onclick="Core.closeModal()">✕</button>
        <div id="modal-body"></div>
    </div>

    <script src="js/html2canvas.min.js"></script>
    <script src="js/license.js"></script>
    <script src="js/app_update.js"></script>
    <script src="js/core.js"></script>
    <script src="js/item_db.js"></script>
    <script src="js/engine.js"></script>
    <script src="js/data_sync.js"></script>
    <script src="js/dash_liquid.js"></script>
    <script src="js/dash_debt.js"></script>
    <script src="js/filter_advanced.js"></script>
    <script src="js/list_item.js"></script>
    <script src="js/form_universal.js"></script>
    <script src="js/form_shopping.js"></script>
    <script src="js/receipt_digital.js"></script>
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js')
                    .then(reg => console.log('CuedMoney SW terdaftar:', reg.scope))
                    .catch(err => console.log('CuedMoney SW gagal:', err));
            });
        }
    </script>
</body>
</html>
